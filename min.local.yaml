AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Timeout: 20
    MemorySize: 512
  Api:
    Cors:
      AllowMethods: '''GET,POST,OPTIONS'''
      AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
      # AllowOrigin: "'https://my-fbp.com'"
      AllowOrigin: '''*'''
Parameters:
  FBPUsersTableName:
    Type: String
    Default: FBP-Users
  FBPConfigTableName:
    Type: String
    Default: FBP-Config
  FBPScheduleTableName:
    # Added parameter for schedule table
    Type: String
    Default: 2025-Schedule
  FBPPicksTableName:
    # Added parameter for picks table
    Type: String
    Default: FBP-Picks
  FBPLogsTableName:
    # Added parameter for logs table
    Type: String
    Default: 2025-Log
  FBPWeeklyResultsTableName:
    # Added parameter for weekly results table
    Type: String
    Default: FBP-Weekly-Results
  FBPWeeklyResultsWeekIndexName:
    Type: String
    Default: WeekIndex
  S3BucketName:
    Type: String
    Default: my-fbp.com

Resources:
  FBPLibLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: FBPLib
      Description: Shared FBP Python utility library
      ContentUri: src/FBPLib-Layer/
      CompatibleRuntimes:
        - python3.14
    Metadata:
      BuildMethod: python3.14

  GetPoolOpenEvent:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetPoolOpen/src/
      Handler: GetPoolOpenEvent.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName: !Ref FBPConfigTableName
      Events:
        GetPoolOpen:
          Type: Api
          Properties:
            Path: /getPoolOpen
            Method: GET
  GetFBPPicksPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetFBPPicksPython/src/
      Handler: GetFBPPicksPython.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPPicksTableName
      Environment:
        Variables:
          FBPPicksTableName: !Ref FBPPicksTableName
      Events:
        GetFBPPicks:
          Type: Api
          Properties:
            Path: /getFBPPicksPython
            Method: GET
  
  GetPoolConfig:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetPoolOpen/src/
      Handler: GetPoolConfig.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName: !Ref FBPConfigTableName
      Events:
        GetPoolConfig:
          Type: Api
          Properties:
            Path: /getPoolConfig
            Method: GET

  SetPoolStatus:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/SetPoolStatus/src/
      Handler: SetPoolStatus.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName: !Ref FBPConfigTableName
      Events:
        SetPoolStatus:
          Type: Api
          Properties:
            Path: /setPoolStatus
            Method: POST

  AddFBPUser:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/AddFBPUser/
      Handler: com.fbp.AddFBPUser::addFBPUser
      Runtime: java11
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /addFBPUser
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPLogsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
  GetFBPPicks:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetFBPPicks/
      Handler: com.fbp.GetFBPPicks::getFBPPicks
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetFBPUserPost:
          Type: Api
          Properties:
            Path: /getFBPPicks
            Method: POST
        GetFBPUserOptions:
          Type: Api
          Properties:
            Path: /getFBPPicks
            Method: OPTIONS

  GetFBPUser:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetFBPUser/
      Handler: com.fbp.GetFBPUser::getFBPUser
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetFBPUserPost:
          Type: Api
          Properties:
            Path: /getFBPUser
            Method: POST
        GetFBPUserOptions:
          Type: Api
          Properties:
            Path: /getFBPUser
            Method: OPTIONS
  GetPoolConfig:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetPoolOpen/src/
      Handler: GetPoolConfig.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName: !Ref FBPConfigTableName
      Events:
        GetPoolConfig:
          Type: Api
          Properties:
            Path: /getPoolConfig
            Method: GET

  GetFBPUserPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetFBPUser-Python/src/
      Handler: GetFBPUser.lambda_handler
      Runtime: python3.14
      Layers:
        - !Ref FBPLibLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
      Environment:
        Variables:
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPConfigTableName: !Ref FBPConfigTableName

      Events:
        GetFBPUserPython:
          Type: Api
          Properties:
            Path: /getFBPUserPython
            Method: POST

  GetAllFBPPicks:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetAllFBPPicks/
      Handler: com.fbp.GetAllFBPPicks::getAllFBPPicks
      Runtime: java11
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetAllFBPPicks:
          Type: Api
          Properties:
            Path: /getAllFBPPicks
            Method: GET
        GetAllFBPPicksOptions:
          Type: Api
          Properties:
            Path: /getAllFBPPicks
            Method: OPTIONS
  GetAllFBPPicksPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetAllFBPPicksPython/src/
      Handler: GetAllFBPPicks.lambda_handler
      Runtime: python3.14
      Architectures:
        - x86_64
      Layers:
        - !Ref FBPLibLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetAllFBPPicksPython:
          Type: Api
          Properties:
            Path: /getAllFBPPicks
            Method: GET
        GetAllFBPPicksPythonOptions:
          Type: Api
          Properties:
            Path: /getAllFBPPicksPython
            Method: OPTIONS

  GetPickSheet:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetPickSheet/
      Handler: com.fbp.GetPickSheet::getPickSheet
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPScheduleTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPScheduleTableName: !Ref FBPScheduleTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetPickSheetPost:
          Type: Api
          Properties:
            Path: /getPickSheet
            Method: GET
        GetPickSheetOptions:
          Type: Api
          Properties:
            Path: /getPickSheet
            Method: OPTIONS
  UpdateFinalScores:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/UpdateFinalScores/
      Handler: com.fbp.UpdateFinalScores::updateFinalScores
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPScheduleTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPScheduleTableName: !Ref FBPScheduleTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        UpdateFinalScoresGet:
          Type: Api
          Properties:
            Path: /updateFinalScores
            Method: GET
        UpdateFinalScoresOptions:
          Type: Api
          Properties:
            Path: /updateFinalScores
            Method: OPTIONS
  CalcWeeklyResults:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/CalcWeeklyResults/
      Handler: com.fbp.CalcWeeklyResults::calcWeeklyResults
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPWeeklyResultsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPScheduleTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPWeeklyResultsTableName: !Ref FBPWeeklyResultsTableName
          FBPScheduleTableName: !Ref FBPScheduleTableName
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPWeeklyResultsWeekIndexName: !Ref FBPWeeklyResultsWeekIndexName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        CalcWeeklyResultsGet:
          Type: Api
          Properties:
            Path: /calcWeeklyResults
            Method: GET
        CalcWeeklyResultsOptions:
          Type: Api
          Properties:
            Path: /calcWeeklyResults
            Method: OPTIONS
  GetPreSignedUrl:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.fbp.GetPreSignedUrlHandler::handleRequest
      Runtime: java11
      CodeUri: src/GetPreSignedUrl/
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          FBPLogsTableName: !Ref FBPLogsTableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - S3ReadPolicy:
            BucketName: !Ref S3BucketName
      Events:
        GetPresignedUrl:
          Type: Api
          Properties:
            Path: /presigned-url
            Method: get
        GetPresignedUrlOptions:
          Type: Api
          Properties:
            Path: /presigned-url
            Method: options

  GetWeeklyResultsSheet:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetWeeklyResultsSheet/
      Handler: com.fbp.GetWeeklyResultsSheet::getWeeklyResultsSheet
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPWeeklyResultsTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - S3WritePolicy:
            BucketName: my-fbp.com
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPWeeklyResultsTableName: !Ref FBPWeeklyResultsTableName
          FBPWeeklyResultsWeekIndexName: !Ref FBPWeeklyResultsWeekIndexName
          FBPConfigTableName: !Ref FBPConfigTableName  
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          BUCKET_NAME: my-fbp.com
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetWeeklyResultsSheetGet:
          Type: Api
          Properties:
            Path: /getWeeklyResultsSheet
            Method: GET
        GetWeeklyResultsSheetOptions:
          Type: Api
          Properties:
            Path: /getWeeklyResultsSheet
            Method: OPTIONS

  SaveContent:
      Type: AWS::Serverless::Function
      Properties:
        CodeUri: src/SaveContent/
        Handler: com.fbp.SaveContent::handleRequest
        Runtime: java11
        Architectures:
          - x86_64
        MemorySize: 512
        Timeout: 30
        Environment:
          Variables:
            BUCKET_NAME: my-fbp.com
            FBPConfigTableName: !Ref FBPConfigTableName
            FBPLogsTableName: !Ref FBPLogsTableName
            GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
        Policies:
          - DynamoDBReadPolicy:
              TableName: !Ref FBPConfigTableName
          - DynamoDBCrudPolicy:
              TableName: !Ref FBPLogsTableName
          - S3WritePolicy:
              BucketName: my-fbp.com
          - Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt GetPoolConfig.Arn
        Events:
          SaveContentPost:
            Type: Api
            Properties:
              Path: /save-content
              Method: POST
          SaveContentOptions:
            Type: Api
            Properties:
              Path: /save-content
              Method: OPTIONS
  ContentSaverDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}
      DashboardBody: !Sub |
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0, "y": 0, "width": 12, "height": 6,
                "properties": {
                  "metrics": [
                    ["AWS/Lambda", "Invocations", "FunctionName", "${SaveContent}"],
                    [".", "Errors", ".", "."],
                    [".", "Duration", ".", "."]
                  ],
                  "period": 300,
                  "stat": "Sum",
                  "region": "${AWS::Region}",
                  "title": "Lambda Metrics"
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 6, "width": 12, "height": 6,
                "properties": {
                  "metrics": [
                    ["AWS/S3", "NumberOfObjects", "BucketName", "my-fbp.com", "StorageType", "AllStorageTypes"]
                  ],
                  "period": 86400,
                  "stat": "Average",
                  "region": "${AWS::Region}",
                  "title": "S3 Object Count"
                }
              }
            ]
          }
  SaveFBPPicks:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/SaveFBPPicks/
      Handler: com.fbp.SaveFBPPicks::saveFBPPicks
      Runtime: java11
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        SaveFBPPicks:
          Type: Api
          Properties:
            Path: /saveFBPPicks
            Method: POST
        SaveFBPPicksOptions:
          Type: Api
          Properties:
            Path: /saveFBPPicks
            Method: OPTIONS

Outputs:
    ApiUrl:
      Description: URL of the API gateway
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
      Export:
        Name: !Sub ${AWS::StackName}-ApiUrl
    GetFBPPicksPythonFunction:
      Description: GetFBPPicksPython Lambda Function ARN
      Value: !GetAtt GetFBPPicksPython.Arn
    GetFBPPicksPythonApi:
      Description: GetFBPPicksPython API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getFBPPicksPython
      Export:
        Name: !Sub ${AWS::StackName}-GetFBPPicksPythonApi
    SetPoolStatusFunction:
      Description: SetPoolStatus Lambda Function ARN
      Value: !GetAtt SetPoolStatus.Arn
    SetPoolStatusApi:
      Description: SetPoolStatus API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/setPoolStatus
      Export:
        Name: !Sub ${AWS::StackName}-SetPoolStatusApi
    GetPoolConfigFunction:
      Description: GetPoolConfig Lambda Function ARN
      Value: !GetAtt GetPoolConfig.Arn
    GetPoolConfigApi:
      Description: GetPoolConfig API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getPoolConfig
      Export:
        Name: !Sub ${AWS::StackName}-GetPoolConfigApi
    GetPoolOpenFunction:
      Description: GetPoolOpen Lambda Function ARN
      Value: !GetAtt GetPoolOpenEvent.Arn
    GetPoolOpenApi:
      Description: GetPoolOpen API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getPoolOpen
      Export:
        Name: !Sub ${AWS::StackName}-GetPoolOpenApi
    GetFBPUserPythonFunction:
      Description: GetFBPUserPython Lambda Function ARN
      Value: !GetAtt GetFBPUserPython.Arn
    GetFBPUserPythonApi:
      Description: GetFBPUserPython API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getFBPUserPython
      Export:
        Name: !Sub ${AWS::StackName}-GetFBPUserPythonApi
    AddFBPUserFunction:
      Description: AddFBPUser Lambda Function ARN
      Value: !GetAtt AddFBPUser.Arn
    AddFBPUserApi:
      Description: AddFBPUser API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/addFBPUser
      Export:
        Name: !Sub ${AWS::StackName}-AddFBPUserApi
    GetFBPUserFunction:
      Description: GetFBPUser Lambda Function ARN
      Value: !GetAtt GetFBPUser.Arn
    GetFBPUserApi:
      Description: GetFBPUser API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getFBPUser
      Export:
        Name: !Sub ${AWS::StackName}-GetFBPUserApi
    GetPickSheetFunction:
      Description: GetPickSheet Lambda Function ARN
      Value: !GetAtt GetPickSheet.Arn
    GetPickSheetApi:
      Description: GetPickSheet API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getPickSheet
      Export:
        Name: !Sub ${AWS::StackName}-GetPickSheetApi
    SaveContentFunction:
      Description: SaveContent Lambda Function ARN
      Value: !GetAtt SaveContent.Arn
      Export: 
        Name: !Sub ${AWS::StackName}-SaveContentFunction  
    SaveContentApi:
      Description: SaveContent API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/save-content
      Export:
        Name: !Sub ${AWS::StackName}-SaveContentApi
    SaveFBPPicksFunction:
      Description: SaveFBPPicks Lambda Function ARN
      Value: !GetAtt SaveFBPPicks.Arn
      Export:
        Name: !Sub ${AWS::StackName}-SaveFBPPicksFunction
    SaveFBPPicksApi:
      Description: SaveFBPPicks API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/saveFBPPicks
      Export:
        Name: !Sub ${AWS::StackName}-SaveFBPPicksApi
    GetFBPPicksFunction:
      Description: GetFBPPicks Lambda Function ARN
      Value: !GetAtt GetFBPPicks.Arn
      Export:
        Name: !Sub ${AWS::StackName}-GetFBPPicksFunction
    GetFBPPicksApi:
      Description: GetFBPPicks API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getFBPPicks
      Export:
        Name: !Sub ${AWS::StackName}-GetFBPPicksApi
    GetAllFBPPicksFunction:
      Description: GetAllFBPPicks Lambda Function ARN
      Value: !GetAtt GetAllFBPPicks.Arn
    GetAllFBPPicksApi:
      Description: GetAllFBPPicks API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getAllFBPPicks
      Export:
        Name: !Sub ${AWS::StackName}-GetAllFBPPicksApi
    GetPreSignedUrlFunction:
      Description: GetPreSignedUrl Lambda Function ARN
      Value: !GetAtt GetPreSignedUrl.Arn
    GetPreSignedUrlApi:
      Description: GetPreSignedUrl API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/presigned-url
      Export:
        Name: !Sub ${AWS::StackName}-GetPreSignedUrlApi
    CalcWeeklyResultsFunction:
      Description: CalcWeeklyResults Lambda Function ARN
      Value: !GetAtt CalcWeeklyResults.Arn
