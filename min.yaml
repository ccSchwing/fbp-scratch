AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
  Api:
    Cors:
      AllowMethods: '''GET,POST,OPTIONS'''
      AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
      # AllowOrigin: "'https://my-fbp.com'"
      AllowOrigin: '''*'''
Parameters:
  FBPUsersTableName:
    Type: String
    Default: FBP-Users
  FBPConfigTableName:
    Type: String
    Default: FBP-Config
  FBPScheduleTableName:
    # Added parameter for schedule table
    Type: String
    Default: 2025-Schedule
  FBPPicksTableName:
    # Added parameter for picks table
    Type: String
    Default: FBP-Picks
  FBPLogsTableName:
    # Added parameter for logs table
    Type: String
    Default: 2025-Log
  FBPWeeklyResultsTableName:
    # Added parameter for weekly results table
    Type: String
    Default: FBP-Weekly-Results
  FBPWeeklyResultsWeekIndexName:
    Type: String
    Default: WeekIndex
  S3BucketName:
    Type: String
    Default: my-fbp.com

Resources:
  GetPoolOpenEvent:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetPoolOpen/src/
      Handler: GetPoolOpenEvent.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName: !Ref FBPConfigTableName
      Events:
        GetPoolOpen:
          Type: Api
          Properties:
            Path: /getPoolOpen
            Method: GET
  GetPoolConfig:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetPoolOpen/src/
      Handler: GetPoolConfig.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName: !Ref FBPConfigTableName
      Events:
        GetPoolConfig:
          Type: Api
          Properties:
            Path: /getPoolConfig
            Method: GET
  SetPoolOpen:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/SetPoolOpen/src/
      Handler: SetPoolOpen.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPConfigTableName
      Environment:
        Variables:
          FBPConfigTableName: !Ref FBPConfigTableName
      Events:
        SetPoolOpen:
          Type: Api
          Properties:
            Path: /setPoolOpen
            Method: POST
  GetFBPUserPython:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetFBPUser-Python/src/
      Handler: GetFBPUser.lambda_handler
      Runtime: python3.14
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
      Environment:
        Variables:
          FBPUsersTableName: !Ref FBPUsersTableName
      Events:
        GetFBPUserPython:
          Type: Api
          Properties:
            Path: /getFBPUserPython
            Method: POST

  GetPreSignedUrl:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.fbp.GetPreSignedUrlHandler::handleRequest
      Runtime: java11
      CodeUri: src/GetPreSignedUrl/target/GetPreSignedUrl-1.0.jar
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          FBPLogsTableName: !Ref FBPLogsTableName
      Policies:
        - DynamoDBCrudPolicy:
           TableName: !Ref FBPLogsTableName
        - S3ReadPolicy:
            BucketName: !Ref S3BucketName
      Events:
        GetPresignedUrl:
          Type: Api
          Properties:
            Path: /presigned-url
            Method: get
        GetPresignedUrlOptions:
          Type: Api
          Properties:
            Path: /presigned-url
            Method: options


  AddFBPUser:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/AddFBPUser/target/AddFBPUser-1.0.jar
      Handler: com.fbp.AddFBPUser::addFBPUser
      Runtime: java11
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /addFBPUser
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
  GetFBPPicks:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetFBPPicks/target/GetFBPPicks-1.0.jar
      Handler: com.fbp.GetFBPPicks::getFBPPicks
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetFBPUserPost:
          Type: Api
          Properties:
            Path: /getFBPPicks
            Method: POST
        GetFBPUserOptions:
          Type: Api
          Properties:
            Path: /getFBPPicks
            Method: OPTIONS

  GetFBPUser:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetFBPUser/target/GetFBPUser-1.0.jar
      Handler: com.fbp.GetFBPUser::getFBPUser
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetFBPUserPost:
          Type: Api
          Properties:
            Path: /getFBPUser
            Method: POST
        GetFBPUserOptions:
          Type: Api
          Properties:
            Path: /getFBPUser
            Method: OPTIONS
  GetAllFBPPicks:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetAllFBPPicks/target/GetAllFBPPicks-1.0.jar
      Handler: com.fbp.GetAllFBPPicks::getAllFBPPicks
      Runtime: java11
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetAllFBPPicks:
          Type: Api
          Properties:
            Path: /getAllFBPPicks
            Method: GET
        GetAllFBPPicksOptions:
          Type: Api
          Properties:
            Path: /getAllFBPPicks
            Method: OPTIONS
            
  GetPickSheet:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetPickSheet/target/GetPickSheet-1.0.jar
      Handler: com.fbp.GetPickSheet::getPickSheet
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPScheduleTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPScheduleTableName: !Ref FBPScheduleTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetPickSheetPost:
          Type: Api
          Properties:
            Path: /getPickSheet
            Method: GET
        GetPickSheetOptions:
          Type: Api
          Properties:
            Path: /getPickSheet
            Method: OPTIONS
  UpdateFinalScores:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/UpdateFinalScores/target/UpdateFinalScores-1.0.jar
      Handler: com.fbp.UpdateFinalScores::updateFinalScores
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FBPScheduleTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPWeeklyResultsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPScheduleTableName: !Ref FBPScheduleTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        UpdateFinalScoresGet:
          Type: Api
          Properties:
            Path: /updateFinalScores
            Method: GET
        UpdateFinalScoresOptions:
          Type: Api
          Properties:
            Path: /updateFinalScores
            Method: OPTIONS
  CalcWeeklyResults:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/CalcWeeklyResults/target/CalcWeeklyResults-1.0.jar
      Handler: com.fbp.CalcWeeklyResults::calcWeeklyResults
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPWeeklyResultsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPScheduleTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPWeeklyResultsTableName: !Ref FBPWeeklyResultsTableName
          FBPScheduleTableName: !Ref FBPScheduleTableName
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPWeeklyResultsWeekIndexName: !Ref FBPWeeklyResultsWeekIndexName
          FBPLogsTableName: !Ref FBPLogsTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        CalcWeeklyResultsGet:
          Type: Api
          Properties:
            Path: /calcWeeklyResults
            Method: GET
        CalcWeeklyResultsOptions:
          Type: Api
          Properties:
            Path: /calcWeeklyResults
            Method: OPTIONS
  GetWeeklyResultsSheet:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/GetWeeklyResultsSheet/target/GetWeeklyResultsSheet-1.0.jar
      Handler: com.fbp.GetWeeklyResultsSheet::getWeeklyResultsSheet
      Runtime: java11
      Architectures:
        - x86_64
      # Remove MemorySize here since it's in Globals
      # Remove Environment here since it's in Globals
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPWeeklyResultsTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - S3WritePolicy:
            BucketName: my-fbp.com
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPWeeklyResultsTableName: !Ref FBPWeeklyResultsTableName
          FBPWeeklyResultsWeekIndexName: !Ref FBPWeeklyResultsWeekIndexName
          FBPConfigTableName: !Ref FBPConfigTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          BUCKET_NAME: my-fbp.com
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        GetWeeklyResultsSheetGet:
          Type: Api
          Properties:
            Path: /getWeeklyResultsSheet
            Method: GET
        GetWeeklyResultsSheetOptions:
          Type: Api
          Properties:
            Path: /getWeeklyResultsSheet
            Method: OPTIONS

  SaveContent:
      Type: AWS::Serverless::Function
      Properties:
        CodeUri: src/SaveContent/target/SaveContent-1.0.jar
        Handler: com.fbp.SaveContent::handleRequest
        Runtime: java11
        Architectures:
          - x86_64
        MemorySize: 512
        Timeout: 30
        Environment:
          Variables:
            BUCKET_NAME: my-fbp.com
            FBPConfigTableName: !Ref FBPConfigTableName
            FBPLogsTableName: !Ref FBPLogsTableName
            GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
        Policies:
          - DynamoDBReadPolicy:
              TableName: !Ref FBPConfigTableName
          - DynamoDBCrudPolicy:
              TableName: !Ref FBPLogsTableName
          - S3WritePolicy:
              BucketName: my-fbp.com
          - Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt GetPoolConfig.Arn
        Events:
          SaveContentPost:
            Type: Api
            Properties:
              Path: /save-content
              Method: POST
          SaveContentOptions:
            Type: Api
            Properties:
              Path: /save-content
              Method: OPTIONS
  ContentSaverDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}
      DashboardBody: !Sub |
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0, "y": 0, "width": 12, "height": 6,
                "properties": {
                  "metrics": [
                    ["AWS/Lambda", "Invocations", "FunctionName", "${SaveContent}"],
                    [".", "Errors", ".", "."],
                    [".", "Duration", ".", "."]
                  ],
                  "period": 300,
                  "stat": "Sum",
                  "region": "${AWS::Region}",
                  "title": "Lambda Metrics"
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 6, "width": 12, "height": 6,
                "properties": {
                  "metrics": [
                    ["AWS/S3", "NumberOfObjects", "BucketName", "my-fbp.com", "StorageType", "AllStorageTypes"]
                  ],
                  "period": 86400,
                  "stat": "Average",
                  "region": "${AWS::Region}",
                  "title": "S3 Object Count"
                }
              }
            ]
          }
  SaveFBPPicks:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/SaveFBPPicks/target/SaveFBPPicks-1.0.jar
      Handler: com.fbp.SaveFBPPicks::saveFBPPicks
      Runtime: java11
      # AutoPublishAlias: live
      SnapStart: null # ApplyOn: PublishedVersions
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPPicksTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref FBPLogsTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPUsersTableName
        - DynamoDBReadPolicy:
            TableName: !Ref FBPConfigTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GetPoolConfig.Arn
      Environment:
        Variables:
          FBPPicksTableName: !Ref FBPPicksTableName
          FBPLogsTableName: !Ref FBPLogsTableName
          FBPUsersTableName: !Ref FBPUsersTableName
          FBPConfigTableName: !Ref FBPConfigTableName
          GET_POOL_CONFIG_FUNCTION: !Ref GetPoolConfig
      Events:
        SaveFBPPicks:
          Type: Api
          Properties:
            Path: /saveFBPPicks
            Method: POST
        SaveFBPPicksOptions:
          Type: Api
          Properties:
            Path: /saveFBPPicks
            Method: OPTIONS

Outputs:
    ApiUrl:
      Description: URL of the API gateway
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
      Export:
        Name: !Sub ${AWS::StackName}-ApiUrl
    GetPoolOpenFunction:
      Description: GetPoolOpen Lambda Function ARN
      Value: !GetAtt GetPoolOpenEvent.Arn
    GetPoolOpenApi:
      Description: GetPoolOpen API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getPoolOpen
      Export:
        Name: !Sub ${AWS::StackName}-GetPoolOpenApi
    GetPoolConfigFunction:
      Description: GetPoolConfig Lambda Function ARN
      Value: !GetAtt GetPoolConfig.Arn
    GetPoolConfigApi:
      Description: GetPoolConfig API Endpoint
      Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/getPoolConfig
      Export:
